<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentinel AI - Advanced Security Assistant</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-light.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-bg: #ffffff;
            --secondary-bg: #f7f7f7;
            --tertiary-bg: #e5e5e5;
            --accent-color: #10a37f;
            --accent-light: #1a7f64;
            --text-primary: #0d0d0d;
            --text-secondary: #999;
            --border-color: #e5e5e5;
            --user-bubble: #e5e5e5;
            --ai-bubble: #f7f7f7;
            --error-color: #ef4444;
            --success-color: #10a37f;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            display: flex;
            background-color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            color: var(--text-primary);
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background-color: var(--secondary-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .sidebar-header {
            padding: 20px 16px;
            border-bottom: 1px solid var(--border-color);
        }

        .sidebar-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 16px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .sidebar-title i {
            font-size: 20px;
            color: var(--accent-color);
        }

        .new-chat-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px 16px;
            margin: 12px;
            background-color: #ffffff;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .new-chat-btn:hover {
            background-color: #f0f0f0;
            border-color: var(--accent-color);
        }

        .chat-history-label {
            padding: 12px 16px 8px;
            font-size: 12px;
            font-weight: 600;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .chat-history {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .history-item {
            padding: 10px 12px;
            margin-bottom: 6px;
            border-radius: 6px;
            font-size: 13px;
            color: #565869;
            cursor: pointer;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .history-item:hover {
            background-color: #e5e5e5;
            color: var(--text-primary);
        }

        .history-item i {
            margin-right: 8px;
            opacity: 0.6;
        }

        .sidebar-footer {
            padding: 12px 16px;
            border-top: 1px solid var(--border-color);
            font-size: 11px;
            color: #999;
            text-align: center;
        }

        .sidebar-footer strong {
            display: block;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: #ffffff;
        }

        .header {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 12px;
            background-color: #ffffff;
        }

        .header-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-title i {
            font-size: 20px;
            color: var(--accent-color);
        }

        .header-status {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--accent-color);
        }

        /* Chat Display */
        .chat-display {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            gap: 20px;
        }

        .empty-state-icon {
            font-size: 60px;
            opacity: 0.4;
        }

        .empty-state-text {
            font-size: 22px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .empty-state-subtext {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .message {
            display: flex;
            gap: 12px;
            align-items: flex-start;
            animation: slideIn 0.3s ease-out;
            margin-bottom: 4px;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
            margin-right: 0;
        }

        .message.ai {
            justify-content: flex-start;
        }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
            flex-shrink: 0;
        }

        .avatar.user {
            background: var(--user-bubble);
            color: var(--text-primary);
        }

        .avatar.ai {
            background: var(--accent-color);
            color: white;
        }

        .message-content {
            max-width: 65%;
            padding: 12px 16px;
            border-radius: 12px;
            word-wrap: break-word;
            line-height: 1.6;
        }

        .message.user .message-content {
            background-color: var(--user-bubble);
            color: var(--text-primary);
            border-bottom-right-radius: 4px;
        }

        .message.ai .message-content {
            background-color: var(--ai-bubble);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            border-bottom-left-radius: 4px;
        }

        .message-content img {
            max-width: 100%;
            border-radius: 8px;
            margin: 8px 0;
        }

        .message-content p {
            margin-bottom: 8px;
        }

        .message-content p:last-child {
            margin-bottom: 0;
        }

        .message-content code {
            background-color: #f0f0f0;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            color: #d63384;
        }

        .message-content pre {
            background-color: #f5f5f5;
            padding: 12px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 8px 0;
            border: 1px solid var(--border-color);
        }

        .message-content pre code {
            background-color: transparent;
            padding: 0;
            border-radius: 0;
            color: var(--text-primary);
        }

        .message-content ul,
        .message-content ol {
            margin-left: 20px;
            margin-top: 8px;
            margin-bottom: 8px;
        }

        .message-content li {
            margin-bottom: 6px;
        }

        .message-content a {
            color: var(--accent-color);
            text-decoration: none;
        }

        .message-content a:hover {
            text-decoration: underline;
        }

        .typing-indicator {
            display: flex;
            gap: 5px;
            padding: 12px 16px;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #d1d5db;
            animation: typing 1.4s infinite;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% { opacity: 0.3; }
            30% { opacity: 1; }
        }

        .error-message {
            color: var(--error-color);
            padding: 12px 16px;
            background-color: rgba(239, 68, 68, 0.1);
            border-radius: 8px;
            border-left: 3px solid var(--error-color);
        }

        /* Input Area */
        .input-area {
            padding: 20px 24px;
            border-top: 1px solid var(--border-color);
            background-color: #ffffff;
        }

        .input-wrapper {
            display: flex;
            gap: 12px;
            align-items: flex-end;
            max-width: 100%;
        }

        .input-container {
            flex: 1;
            background-color: #ffffff;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.2s;
        }

        .input-container:focus-within {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 2px rgba(16, 163, 127, 0.1);
        }

        .input-field {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-primary);
            font-size: 15px;
            resize: none;
            max-height: 120px;
            font-family: inherit;
        }

        .input-field::placeholder {
            color: var(--text-secondary);
        }

        .input-icons {
            display: flex;
            gap: 6px;
        }

        .icon-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 16px;
            transition: all 0.2s;
            padding: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-btn:hover {
            color: var(--accent-color);
        }

        .send-btn {
            background-color: var(--accent-color);
            color: white;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            font-size: 16px;
        }

        .send-btn:hover:not(:disabled) {
            background-color: var(--accent-light);
            transform: scale(1.05);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Image Preview */
        .image-preview {
            position: relative;
            display: inline-block;
            margin-bottom: 8px;
        }

        .image-preview img {
            max-width: 150px;
            max-height: 150px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        .remove-image {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        /* File Input (hidden) */
        #imageInput, #voiceInput {
            display: none;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background-color: var(--border-color);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background-color: var(--text-secondary);
        }

        /* Error Message */
        .error-message {
            color: var(--error-color);
            padding: 12px 16px;
            background-color: #fee2e2;
            border-radius: 8px;
            border-left: 3px solid var(--error-color);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                display: none;
            }

            .chat-display {
                padding: 16px;
            }

            .message-content {
                max-width: 85%;
            }

            .input-area {
                padding: 12px 16px;
            }
        }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-title">
                <i class="fas fa-shield-alt"></i>
                <span>Sentinel AI</span>
            </div>
        </div>

        <button class="new-chat-btn" onclick="startNewChat()">
            <i class="fas fa-plus"></i>
            New Chat
        </button>

        <div class="chat-history-label">Chat History</div>
        <div class="chat-history" id="chatHistory"></div>

        <div class="sidebar-footer">
            <strong>Sentinel AI v1.0</strong>
            <p>Security & Intelligence Assistant</p>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <!-- Header -->
        <div class="header">
            <div class="header-title">
                <i class="fas fa-shield-alt"></i>
                <span>Sentinel AI - Security Assistant</span>
            </div>
            <div class="header-status">
                <div class="status-dot"></div>
                <span>Online</span>
            </div>
        </div>

        <!-- Chat Display -->
        <div class="chat-display" id="chatBox">
            <div class="empty-state">
                <div class="empty-state-icon">🛡️</div>
                <div class="empty-state-text">Welcome to Sentinel AI</div>
                <div class="empty-state-subtext">Your Security & Intelligence Assistant</div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="input-area">
            <div id="imagePreview" class="image-preview" style="display:none;"></div>
            <div class="input-wrapper">
                <div class="input-container">
                    <textarea 
                        class="input-field" 
                        id="userInput" 
                        placeholder="Ask me anything..." 
                        autocomplete="off"
                        onkeydown="handleKeyPress(event)"
                        rows="1"
                    ></textarea>
                    <div class="input-icons">
                        <button class="icon-btn" title="Upload Image" onclick="triggerImageUpload()">
                            <i class="fas fa-image"></i>
                        </button>
                        <button class="icon-btn" title="Voice Input" onclick="toggleVoiceInput()">
                            <i class="fas fa-microphone"></i>
                        </button>
                    </div>
                </div>
                <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="Send (Ctrl+Enter)">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Hidden Input Elements -->
    <input type="file" id="imageInput" accept="image/*" onchange="handleImageUpload(event)">
    <input type="file" id="voiceInput" accept="audio/*">

    <script>
        marked.setOptions({
            breaks: true,
            gfm: true,
        });

        const chatBox = document.getElementById('chatBox');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const chatHistory = document.getElementById('chatHistory');
        const imagePreview = document.getElementById('imagePreview');

        let currentSessionId = 'session_' + Date.now();
        let currentImage = null;
        let isRecording = false;
        let mediaRecorder = null;

        // Auto-resize textarea
        userInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 120) + 'px';
        });

        function handleKeyPress(event) {
            if ((event.ctrlKey || event.metaKey) && event.key === 'Enter') {
                event.preventDefault();
                sendMessage();
            }
        }

        function triggerImageUpload() {
            document.getElementById('imageInput').click();
        }

        function handleImageUpload(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    currentImage = e.target.result;
                    displayImagePreview(e.target.result);
                };
                reader.readAsDataURL(file);
            }
        }

        function displayImagePreview(imageData) {
            imagePreview.innerHTML = `
                <div class="image-preview">
                    <img src="${imageData}" alt="Preview">
                    <button class="remove-image" onclick="removeImage()" title="Remove image">✕</button>
                </div>
            `;
            imagePreview.style.display = 'block';
        }

        function removeImage() {
            currentImage = null;
            imagePreview.style.display = 'none';
            imagePreview.innerHTML = '';
            document.getElementById('imageInput').value = '';
        }

        async function toggleVoiceInput() {
            if (!isRecording) {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    const audioChunks = [];

                    mediaRecorder.ondataavailable = (event) => {
                        audioChunks.push(event.data);
                    };

                    mediaRecorder.onstop = async () => {
                        const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                        alert('Voice recording complete. Transcription service coming soon!');
                    };

                    mediaRecorder.start();
                    isRecording = true;
                    document.querySelector('[title="Voice Input"]').style.color = '#ef4444';
                } catch (error) {
                    alert('Microphone permission denied or not available');
                }
            } else {
                mediaRecorder.stop();
                isRecording = false;
                document.querySelector('[title="Voice Input"]').style.color = '#999';
            }
        }

        async function sendMessage() {
            const message = userInput.value.trim();
            
            if (!message && !currentImage) return;

            userInput.value = '';
            userInput.style.height = 'auto';

            const emptyState = chatBox.querySelector('.empty-state');
            if (emptyState) emptyState.remove();

            addMessageToChat('user', message, currentImage);

            sendBtn.disabled = true;

            const typingDiv = document.createElement('div');
            typingDiv.className = 'message ai';
            typingDiv.innerHTML = `
                <div class="avatar ai">✨</div>
                <div class="typing-indicator">
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                </div>
            `;
            chatBox.appendChild(typingDiv);
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: message,
                        session_id: currentSessionId,
                        image: currentImage
                    })
                });

                const data = await response.json();
                typingDiv.remove();

                if (data.success) {
                    addMessageToChat('ai', data.reply);
                    addToHistory(message);
                    removeImage();
                } else {
                    addMessageToChat('error', data.error || 'Something went wrong');
                }
            } catch (error) {
                typingDiv.remove();
                addMessageToChat('error', 'Failed to connect to server');
                console.error('Error:', error);
            } finally {
                sendBtn.disabled = false;
                userInput.focus();
            }
        }

        function addMessageToChat(role, message, imageData = null) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;

            if (role === 'error') {
                messageDiv.innerHTML = `
                    <div class="avatar ai">⚠️</div>
                    <div class="message-content error-message">${escapeHtml(message)}</div>
                `;
            } else {
                const avatarText = role === 'user' ? '👤' : '🤖';
                const avatarClass = role === 'user' ? 'user' : 'ai';

                let content = message;
                if (role === 'ai') {
                    content = marked.parse(message);
                }

                let imageHtml = '';
                if (imageData && role === 'user') {
                    imageHtml = `<img src="${imageData}" alt="User uploaded image">`;
                }

                messageDiv.innerHTML = `
                    <div class="avatar ${avatarClass}">${avatarText}</div>
                    <div class="message-content">${imageHtml}<div>${content}</div></div>
                `;
            }

            chatBox.appendChild(messageDiv);

            if (role === 'ai') {
                messageDiv.querySelectorAll('pre code').forEach(block => {
                    hljs.highlightElement(block);
                });
            }

            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function addToHistory(message) {
            const item = document.createElement('div');
            item.className = 'history-item';
            item.innerHTML = `<i class="fas fa-message"></i>${message.substring(0, 35)}${message.length > 35 ? '...' : ''}`;
            item.onclick = () => {
                const sessionId = 'session_' + Date.now();
                loadChatSession(sessionId);
            };
            chatHistory.insertBefore(item, chatHistory.firstChild);
        }

        function startNewChat() {
            currentSessionId = 'session_' + Date.now();
            chatBox.innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">🛡️</div>
                    <div class="empty-state-text">New Chat</div>
                    <div class="empty-state-subtext">Start asking questions</div>
                </div>
            `;
            userInput.value = '';
            userInput.style.height = 'auto';
            removeImage();
            userInput.focus();
        }

        function loadChatSession(sessionId) {
            startNewChat();
        }

        userInput.focus();
    </script>
</body>
</html>
