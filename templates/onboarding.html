<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Llama - Onboarding 🌸</title>

    <!-- Modern Anime Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Quicksand:wght@500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* =========================================================
           🌸 ANIME DAY & NIGHT THEME - ONBOARDING
           ========================================================= */
        :root {
            --bg-main: #fdfbfb;
            --bg-card: rgba(255, 255, 255, 0.95);
            --border-color: rgba(255, 183, 195, 0.4);
            --text-primary: #4a4e69;
            --text-secondary: #9fa0b4;
            --accent-main: #ff9eaa;
            --accent-sub: #ffb5a7;
            --accent-cyan: #a0c4ff;
            --opt-hover-bg: rgba(255, 158, 170, 0.1);
            --shadow-color: rgba(255, 158, 170, 0.2);
        }

        body.dark-mode {
            --bg-main: #0b0e14;
            --bg-card: rgba(20, 25, 40, 0.95);
            --border-color: rgba(167, 139, 250, 0.3);
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --accent-main: #c4b5fd;
            --accent-sub: #a78bfa;
            --accent-cyan: #7dd3fc;
            --opt-hover-bg: rgba(167, 139, 250, 0.1);
            --shadow-color: rgba(0, 0, 0, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Nunito', sans-serif;
        }

        body {
            background: var(--bg-main);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
            transition: background 0.4s ease;
            color: var(--text-primary);
        }

        .anime-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background: linear-gradient(120deg, #e0c3fc 0%, #8ec5fc 100%);
            opacity: 0.15;
            transition: opacity 0.4s ease;
        }

        body.dark-mode .anime-bg {
            background: linear-gradient(135deg, #09090e 0%, #17172b 100%);
            opacity: 0.9;
        }

        .sakura-petal {
            position: absolute;
            top: -10%;
            width: 14px;
            height: 14px;
            background: linear-gradient(135deg, #ffcbf2, #ffb5a7);
            border-radius: 15px 3px 15px 3px;
            opacity: 0.7;
            filter: drop-shadow(0 2px 4px rgba(255, 158, 170, 0.4));
            animation: fallSakura linear infinite;
        }

        body.dark-mode .sakura-petal {
            background: linear-gradient(135deg, #c4b5fd, #7dd3fc);
            filter: drop-shadow(0 0 10px rgba(167, 139, 250, 0.8));
            opacity: 0.9;
        }

        @keyframes fallSakura {
            0% {
                transform: translate(0, 0) rotate(0deg) scale(0.8);
                opacity: 0;
            }

            10% {
                opacity: 0.8;
            }

            90% {
                opacity: 0.6;
            }

            100% {
                transform: translate(100px, 110vh) rotate(360deg) scale(1.2);
                opacity: 0;
            }
        }

        .theme-toggle-btn {
            position: fixed;
            top: 30px;
            right: 30px;
            z-index: 20;
            background: var(--bg-card);
            color: var(--accent-main);
            border: 2px solid #fff;
            width: 50px;
            height: 50px;
            border-radius: 20px;
            font-size: 1.2rem;
            cursor: pointer;
            box-shadow: 0 10px 25px var(--shadow-color);
            transition: all 0.3s;
        }

        body.dark-mode .theme-toggle-btn {
            border-color: rgba(167, 139, 250, 0.4);
        }

        .theme-toggle-btn:hover {
            transform: scale(1.1) rotate(5deg);
            box-shadow: 0 15px 30px var(--shadow-color);
        }

        .card {
            background: var(--bg-card);
            padding: 50px 40px;
            border-radius: 35px;
            border: 2px solid #fff;
            box-shadow: 0 20px 50px var(--shadow-color);
            width: 100%;
            max-width: 400px;
            text-align: center;
            backdrop-filter: blur(20px);
            position: relative;
            z-index: 10;
            animation: slideInUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        body.dark-mode .card {
            border-color: rgba(167, 139, 250, 0.3);
        }

        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h2 {
            font-family: 'Quicksand', sans-serif;
            font-size: 28px;
            font-weight: 800;
            color: var(--accent-main);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        p {
            color: var(--text-secondary);
            margin-bottom: 35px;
            font-weight: 600;
            font-size: 1.05rem;
        }

        input {
            width: 100%;
            padding: 18px 22px;
            border: 2px solid var(--border-color);
            border-radius: 20px;
            font-size: 1.05rem;
            font-weight: 700;
            outline: none;
            margin-bottom: 20px;
            transition: 0.3s;
            background: rgba(0, 0, 0, 0.02);
            color: var(--text-primary);
            box-sizing: border-box;
        }

        body.dark-mode input {
            background: #05080f;
            border-color: rgba(167, 139, 250, 0.3);
        }

        input:focus {
            border-color: var(--accent-main);
            background: transparent;
            box-shadow: 0 0 0 4px var(--opt-hover-bg);
        }

        input::placeholder {
            color: var(--text-secondary);
            font-weight: 600;
            font-style: italic;
        }

        button.action-btn {
            width: 100%;
            padding: 20px;
            background: linear-gradient(135deg, var(--accent-main), var(--accent-cyan));
            color: white;
            border: 2px solid #fff;
            border-radius: 20px;
            font-weight: 800;
            font-family: 'Nunito';
            cursor: pointer;
            font-size: 1.1rem;
            transition: 0.3s;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            margin-top: 10px;
        }

        body.dark-mode button.action-btn {
            border-color: rgba(167, 139, 250, 0.4);
        }

        button.action-btn:hover {
            transform: scale(1.03) translateY(-2px);
            box-shadow: 0 15px 30px var(--shadow-color);
            filter: brightness(1.1);
        }
    </style>
</head>

<body>

    <div class="anime-bg"></div>
    <button class="theme-toggle-btn" onclick="toggleTheme()" title="Switch Day/Night">
        <i class="fas fa-moon" id="themeIcon"></i>
    </button>

    <div class="card">
        <h2><i class="fas fa-shield-cat"></i> Secure Llama</h2>
        <p>Enterprise Onboarding 🌸</p>

        <input type="text" id="n" placeholder="Your Name">
        <input type="email" id="e" placeholder="Your key">

        <button class="action-btn" onclick="join()">Start Session <i class="fas fa-arrow-right"
                style="margin-left: 8px;"></i></button>
    </div>

    <script>
        // THEME ENGINE
        function initTheme() {
            if (localStorage.getItem('sentinel_theme') === 'dark') {
                document.body.classList.add('dark-mode');
                document.getElementById('themeIcon').className = 'fas fa-sun';
            }
        }
        initTheme();

        function toggleTheme() {
            const isDark = document.body.classList.toggle('dark-mode');
            localStorage.setItem('sentinel_theme', isDark ? 'dark' : 'light');
            document.getElementById('themeIcon').className = isDark ? 'fas fa-sun' : 'fas fa-moon';
        }

        // SAKURA FX
        function initSakura() {
            const sdk = document.createElement('div');
            sdk.style.position = 'fixed'; sdk.style.inset = '0';
            sdk.style.pointerEvents = 'none'; sdk.style.zIndex = '1';
            sdk.style.overflow = 'hidden';
            document.body.appendChild(sdk);
            for (let i = 0; i < 25; i++) {
                let petal = document.createElement('div');
                petal.className = 'sakura-petal';
                petal.style.left = (Math.random() * 100) + 'vw';
                petal.style.animationDuration = (Math.random() * 5 + 5) + 's';
                petal.style.animationDelay = (Math.random() * 4) + 's';
                sdk.appendChild(petal);
            }
        }
        window.addEventListener('DOMContentLoaded', initSakura);

        // LOGIN LOGIC (Hybrid Support)
        async function join() {
            const n = document.getElementById('n').value.trim();
            const e = document.getElementById('e').value.trim();

            if (!n || !e) {
                if (!n) document.getElementById('n').style.borderColor = '#ff5d8f';
                if (!e) document.getElementById('e').style.borderColor = '#ff5d8f';
                setTimeout(() => {
                    document.getElementById('n').style.borderColor = '';
                    document.getElementById('e').style.borderColor = '';
                }, 2000);
                return;
            }

            try {
                // Preserved Backend Call
                await fetch('/api/onboard', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: n, email: e })
                });

                // Flow strictly routes onboarding -> use_case.html setup
                location.href = 'use_case.html';
            } catch (err) {
                console.error("Backend unreachable", err);
                // Fallback route for Local Live Server tests
                localStorage.setItem('sentinel_name', n);
                location.href = 'use_case.html';
            }
        }
    </script>
</body>

</html>
