<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sentinel AI - Setup</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f3f4f6; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .wizard-card { background: white; padding: 48px; border-radius: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.05); width: 100%; max-width: 500px; text-align: center; }
        .step { display: none; } .step.active { display: block; animation: slideIn 0.5s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        h1 { font-size: 28px; color: #1e3a8a; margin-bottom: 8px; }
        p { color: #64748b; margin-bottom: 32px; }
        .opt { padding: 20px; border: 2px solid #e5e7eb; border-radius: 14px; margin-bottom: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 15px; transition: 0.2s; font-weight: 500; font-size: 1.1rem; }
        .opt:hover { border-color: #2563eb; background: #eff6ff; color: #2563eb; }
        input, textarea { width: 100%; padding: 16px; border: 2px solid #e2e8f0; border-radius: 16px; font-size: 16px; outline: none; margin-bottom: 20px; transition: 0.2s; box-sizing: border-box; }
        input:focus, textarea:focus { border-color: #2563eb; }
        .btn-main { width: 100%; padding: 18px; background: #2563eb; color: white; border: none; border-radius: 16px; font-weight: 700; cursor: pointer; font-size: 1rem; transition: 0.2s; }
        .btn-main:hover { background: #1d4ed8; }
    </style>
</head>
<body>
    <div class="wizard-card">
        <div id="step1" class="step active">
            <h1>Workspace Goal</h1>
            <p>Select your primary use for Sentinel AI.</p>
            <div class="opt" onclick="goNext('Personal Study')">Personal Use or Study</div>
            <div class="opt" onclick="goNext('Software Engineering')">Software Engineering</div>
            <div class="opt" onclick="goNext('Cyber Security')">Security Analysis</div>
        </div>

        <div id="step2" class="step">
            <h1>Identification</h1>
            <p>AI will call you by this name.</p>
            <input type="text" id="pName" placeholder="Your Name (e.g. Harshit)">
            <textarea id="pBio" rows="3" placeholder="Description (e.g. Cyber Analyst)"></textarea>
            <button class="btn-main" onclick="finishSetup()">Complete Setup ➔</button>
        </div>
    </div>

    <script>
        let uc = "";

        function checkAuth() {
            const urlParams = new URLSearchParams(window.location.search);
            const urlToken = urlParams.get('token');
            if(urlToken) {
                localStorage.setItem('sentinel_token', urlToken);
                window.history.replaceState({}, document.title, window.location.pathname);
            }
            const token = localStorage.getItem('sentinel_token');
            if(!token) window.location.href = '/login';
            return token;
        }

        const token = checkAuth();

        function goNext(v) { 
            uc = v; 
            document.getElementById('step1').classList.remove('active'); 
            document.getElementById('step2').classList.add('active'); 
        }

        async function finishSetup() {
            const name = document.getElementById('pName').value.trim();
            const bio = document.getElementById('pBio').value.trim();
            if(!name) return alert("Name please!");

            const res = await fetch('/api/profile', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + token
                },
                body: JSON.stringify({preferred_name: name, bio: bio, use_case: uc})
            });

            if(res.ok) window.location.href = '/dashboard';
            else alert("Sync Failed. Try logging in again.");
        }
    </script>
</body>
</html>
